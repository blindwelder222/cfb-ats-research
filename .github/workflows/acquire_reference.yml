name: Acquire Reference Data

on:
  workflow_dispatch:

jobs:
  acquire-reference:
    runs-on: ubuntu-latest

    env:
      CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cfbd

      - name: Acquire Conferences
        run: |
          python src/acquisition/jobs/conferences.py

      - name: Acquire Venues
        run: |
          python src/acquisition/jobs/venues.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-data
          path: data/raw/reference/
