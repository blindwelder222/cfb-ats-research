name: Analyze Betting Dataset

on:
  workflow_dispatch:

jobs:

  analyze-betting:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pandas
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Analyze Betting Dataset
        run: |
          python src/analysis/analyze_betting.py

      - name: Upload Betting Report
        uses: actions/upload-artifact@v4
        with:
          name: betting-profile
          path: reports/profiling/
